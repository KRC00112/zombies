name: build-and-deploy-on-push
on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  push-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
          uses:actions/checkout@v4
      - name: install dependencies
        run: npm install
      - name: build project
        run : npm run build
      - name: deploy project
        run : npm run deploy

