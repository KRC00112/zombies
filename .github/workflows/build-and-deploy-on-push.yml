name: build-and-deploy-on-push
on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  push-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: install dependencies
        run: npm install

      - name: build project
        run: npm run build


      - name: deploy project on github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{secrets.GH_PAGES_PAT}}
          publish_dir: ./dist
